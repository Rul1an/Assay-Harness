version: 2
updates:
  - package-ecosystem: "npm"
    directory: "harness/"
    schedule:
      interval: "weekly"
    # 5-day cooldown so freshly published versions ripen before we ingest.
    # Mitigates flash-spread compromise vectors on the npm ecosystem.
    cooldown:
      default-days: 5
      semver-major-days: 14
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: ".github/workflows/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 14
    groups:
      actions:
        patterns:
          - "*"
