version: 2
updates:
  - package-ecosystem: "npm"
    directory: "harness/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: ".github/workflows/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
