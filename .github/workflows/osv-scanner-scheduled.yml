name: Scheduled OSV Advisory

on:
  schedule:
    - cron: "59 5 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  osv-npm:
    name: OSV npm advisory scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OSV scanner
        uses: google/osv-scanner-action/osv-scanner-action@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
        with:
          scan-args: |-
            --format=json
            --output=osv-results.json
            harness/package-lock.json
        continue-on-error: true

      - name: Build advisory SARIF
        uses: google/osv-scanner-action/osv-reporter-action@a82132c0bd6c7261ffcb78e754c46c70ab57ad9a # v2.3.8
        with:
          scan-args: |-
            --output=osv-results.sarif
            --new=osv-results.json
            --gh-annotations=false
            --fail-on-vuln=false

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner-npm
