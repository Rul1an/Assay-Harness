name: Harness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      assay_version:
        description: "Assay release tag to run receipt recipes against"
        required: false
        default: "v3.9.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Default to no privileges at workflow level; jobs grant the minimum they need.
permissions: {}

jobs:
  node-tests:
    name: Node Tests + Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Type check
        working-directory: harness
        run: npx tsc --noEmit

      - name: Run Node tests
        working-directory: harness
        run: npm test

  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Map valid fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/valid.harness.json \
            --output /tmp/valid.assay.ndjson \
            --import-time 2026-04-16T12:00:00Z \
            --overwrite

      - name: Map failure fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/failure.harness.json \
            --output /tmp/failure.assay.ndjson \
            --import-time 2026-04-16T12:05:00Z \
            --overwrite

      - name: Malformed fixture must fail
        run: |
          if python3 mapper/map_to_assay.py \
            fixtures/malformed.harness.json \
            --output /tmp/malformed.assay.ndjson \
            --import-time 2026-04-16T12:10:00Z \
            --overwrite 2>&1; then
            echo "ERROR: malformed fixture should have been rejected"
            exit 1
          else
            echo "OK: malformed fixture correctly rejected"
          fi

      - name: Verify golden output matches
        run: |
          diff /tmp/valid.assay.ndjson fixtures/valid.assay.ndjson
          diff /tmp/failure.assay.ndjson fixtures/failure.assay.ndjson
          echo "OK: golden outputs match checked-in fixtures"

  golden-contracts:
    name: Golden Contract Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run golden contract tests
        run: python3 -m unittest tests.test_contracts -v

  hardening:
    name: Hardening Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: ./.github/actions/setup-node-harness

      - name: Run hardening tests
        run: python3 -m unittest tests.test_hardening -v

  policy-validation:
    name: Policy Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Validate policy - allowed tool
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool read_file
          echo "OK: read_file correctly allowed"

      - name: Validate policy - denied tool (exit 1)
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool network_egress && exit 1 || echo "OK: network_egress correctly denied (exit 1)"

      - name: Validate policy - approval-required tool
        working-directory: harness
        run: |
          output=$(npx tsx src/cli.ts policy --tool write_file)
          echo "$output"
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['decision'] == 'require_approval', f'Expected require_approval, got {d[\"decision\"]}'
          print('OK: write_file correctly requires approval')
          "

  verify-evidence:
    name: Verify Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: contract-validation
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Verify valid evidence (all categories)
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/valid.assay.ndjson --category all

      - name: Verify failure evidence
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/failure.assay.ndjson

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [contract-validation, verify-evidence]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Run compare
        id: compare
        working-directory: harness
        continue-on-error: true
        run: |
          mkdir -p ../results
          npx tsx src/cli.ts compare \
            --baseline ../fixtures/valid.assay.ndjson \
            --candidate ../fixtures/failure.assay.ndjson \
            --format json \
            | tee ../results/compare-report.json

      - name: Generate Trust Basis diff projections
        if: always() && hashFiles('results/trust-basis.diff.json') != ''
        working-directory: harness
        run: |
          npx tsx src/cli.ts trust-basis report \
            --diff ../results/trust-basis.diff.json \
            --summary-out ../results/trust-basis-summary.md \
            --junit-out ../results/junit-trust-basis.xml

      - name: Generate Trust Basis contract fixture projections
        if: always()
        working-directory: harness
        run: |
          mkdir -p ../results/trust-basis-contract
          cp fixtures/trust-basis/nonregression.trust-basis.diff.json \
            ../results/trust-basis-contract/nonregression.trust-basis.diff.json
          cp fixtures/trust-basis/regression.trust-basis.diff.json \
            ../results/trust-basis-contract/regression.trust-basis.diff.json
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/nonregression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/nonregression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-nonregression.xml
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/regression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/regression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-regression.xml

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Regression Gate"
            echo ""

            if [ -f "results/compare-report.json" ]; then
              HAS_REG=$(python3 -c "import json; d=json.load(open('results/compare-report.json')); print('yes' if d.get('has_regressions') else 'no')")
              if [ "$HAS_REG" = "yes" ]; then
                echo "**Status:** REGRESSION DETECTED"
              else
                echo "**Status:** OK"
              fi
              echo "**Baseline:** fixtures/valid.assay.ndjson"
              echo "**Candidate:** fixtures/failure.assay.ndjson"
              echo ""
              echo "### Findings"
              python3 -c "
          import json
          d = json.load(open('results/compare-report.json'))
          print(f\"- New denials: {len(d.get('new_denials', []))}\")
          print(f\"- Hash mismatches: {len(d.get('hash_mismatches', []))}\")
          print(f\"- Process counter changes: {len(d.get('process_summary_delta', []))}\")
          "
            else
              echo "**Status:** ERROR - compare report not found"
            fi

            if [ -f "results/trust-basis-summary.md" ]; then
              echo ""
              cat "results/trust-basis-summary.md"
            fi

            if [ -f "results/trust-basis-contract/nonregression-summary.md" ]; then
              echo ""
              echo "## Trust Basis Contract Fixture"
              echo ""
              cat "results/trust-basis-contract/nonregression-summary.md"
            fi

            if [ -f "results/trust-basis-contract/regression-summary.md" ]; then
              echo ""
              cat "results/trust-basis-contract/regression-summary.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate JUnit XML from compare
        if: always() && steps.compare.outcome != 'skipped'
        run: |
          python3 ci/emit_compare_junit.py \
            results/compare-report.json \
            --output results/junit-compare.xml

      - name: Upload compare results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compare-report
          path: |
            results/compare-report.json
            results/junit-compare.xml
            results/trust-basis.diff.json
            results/trust-basis-summary.md
            results/junit-trust-basis.xml
            results/trust-basis-contract/nonregression.trust-basis.diff.json
            results/trust-basis-contract/regression.trust-basis.diff.json
            results/trust-basis-contract/nonregression-summary.md
            results/trust-basis-contract/regression-summary.md
            results/trust-basis-contract/junit-nonregression.xml
            results/trust-basis-contract/junit-regression.xml

      - name: Fail on regressions
        if: steps.compare.outcome == 'failure'
        run: |
          echo "Regressions detected — failing the gate."
          exit 1

  evidence-export:
    name: Evidence Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    needs: [contract-validation, verify-evidence, regression-gate]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate JUnit XML (valid)
        run: |
          python3 ci/emit_junit.py \
            fixtures/valid.assay.ndjson \
            --output results/junit-valid.xml

      - name: Generate JUnit XML (failure)
        run: |
          python3 ci/emit_junit.py \
            fixtures/failure.assay.ndjson \
            --output results/junit-failure.xml

      - name: Generate SARIF (valid)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/valid.assay.ndjson \
            --output results/sarif-valid.json

      - name: Generate SARIF (failure)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/failure.assay.ndjson \
            --output results/sarif-failure.json

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harness-evidence
          path: |
            results/junit-*.xml
            results/sarif-*.json
            fixtures/valid.assay.ndjson
            fixtures/failure.assay.ndjson

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results/sarif-valid.json
          category: assay-harness

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Assay Harness Evidence Report"
            echo ""
            echo "| Fixture | JUnit | SARIF |"
            echo "|---------|-------|-------|"
            echo "| valid | \`results/junit-valid.xml\` | \`results/sarif-valid.json\` |"
            echo "| failure | \`results/junit-failure.xml\` | \`results/sarif-failure.json\` |"
            echo ""
            echo "### Event Counts"
            valid_events=$(wc -l < "fixtures/valid.assay.ndjson")
            failure_events=$(wc -l < "fixtures/failure.assay.ndjson")
            echo "- valid: ${valid_events} events"
            echo "- failure: ${failure_events} events"
          } >> "$GITHUB_STEP_SUMMARY"

  assay-release-compatibility:
    name: Assay Release Compatibility Recipes
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Resolve Assay release tag
        # The workflow_dispatch input is read via env to prevent shell
        # template injection (zizmor: template-injection).
        env:
          ASSAY_VERSION_INPUT: ${{ inputs.assay_version }}
        run: |
          assay_version="$ASSAY_VERSION_INPUT"
          if [ -z "$assay_version" ]; then
            assay_version="v3.9.0"
          fi
          case "$assay_version" in
            v*) ;;
            *) assay_version="v${assay_version}" ;;
          esac
          echo "ASSAY_VERSION=$assay_version" >> "$GITHUB_ENV"

      - name: Download Assay release binary
        run: |
          set -euo pipefail
          mkdir -p /tmp/assay-release
          cd /tmp/assay-release

          asset="assay-${ASSAY_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          base_url="https://github.com/Rul1an/assay/releases/download/${ASSAY_VERSION}"
          curl -fsSLO "${base_url}/${asset}"
          curl -fsSLO "${base_url}/${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          tar -xzf "$asset"

          assay_bin="/tmp/assay-release/assay-${ASSAY_VERSION}-x86_64-unknown-linux-gnu/assay"
          test -x "$assay_bin"
          echo "ASSAY_BIN=$assay_bin" >> "$GITHUB_ENV"
          "$assay_bin" --version

      - name: Run receipt recipes against Assay release
        run: |
          set -euo pipefail
          root="$PWD"
          results="$root/results/assay-release-compatibility"
          mkdir -p "$results"

          run_recipe() {
            family="$1"
            script="$2"
            case_name="$3"
            expected="$4"
            out_dir="$results/${family}-${case_name}"

            set +e
            ASSAY_BIN="$ASSAY_BIN" "$script" \
              --case "$case_name" \
              --out-dir "$out_dir" \
              --overwrite
            status="$?"
            set -e

            if [ "$status" -ne "$expected" ]; then
              echo "Expected ${script} ${case_name} to exit ${expected}, got ${status}" >&2
              exit 1
            fi

            test -f "$out_dir/trust-basis.diff.json"
            test -f "$out_dir/trust-basis-summary.md"
            test -f "$out_dir/junit-trust-basis.xml"
          }

          run_recipe promptfoo demo/run-promptfoo-receipt-pipeline.sh nonregression 0
          run_recipe promptfoo demo/run-promptfoo-receipt-pipeline.sh trust-basis-regression-fixture 1
          run_recipe openfeature demo/run-openfeature-decision-receipt-pipeline.sh nonregression 0
          run_recipe openfeature demo/run-openfeature-decision-receipt-pipeline.sh trust-basis-regression-fixture 1
          run_recipe cyclonedx demo/run-cyclonedx-mlbom-model-receipt-pipeline.sh nonregression 0
          run_recipe cyclonedx demo/run-cyclonedx-mlbom-model-receipt-pipeline.sh trust-basis-regression-fixture 1

      - name: Compatibility summary
        if: always()
        run: |
          {
            echo "## Assay Release Compatibility Recipes"
            echo ""
            echo "**Assay release:** \`${ASSAY_VERSION:-unknown}\`"
            echo ""
            echo "| Family | Non-regression | Regression fixture |"
            echo "|---|---:|---:|"
            echo "| Promptfoo eval receipts | exit 0 | exit 1 |"
            echo "| OpenFeature decision receipts | exit 0 | exit 1 |"
            echo "| CycloneDX ML-BOM inventory receipts | exit 0 | exit 1 |"
            echo ""
            echo "Each recipe must produce \`trust-basis.diff.json\`, \`trust-basis-summary.md\`, and \`junit-trust-basis.xml\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload recipe compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: assay-release-compatibility-recipes-${{ env.ASSAY_VERSION }}
          path: results/assay-release-compatibility/**
