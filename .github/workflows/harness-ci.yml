name: Harness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      assay_version:
        description: "Assay release tag to run receipt recipes against"
        required: false
        default: "v3.27.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Default to no privileges at workflow level; jobs grant the minimum they need.
permissions: {}

jobs:
  node-tests:
    name: Node Tests + Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Type check
        working-directory: harness
        run: npx tsc --noEmit

      - name: Run Node tests
        working-directory: harness
        run: npm test

  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Map valid fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/valid.harness.json \
            --output /tmp/valid.assay.ndjson \
            --import-time 2026-04-16T12:00:00Z \
            --overwrite

      - name: Map failure fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/failure.harness.json \
            --output /tmp/failure.assay.ndjson \
            --import-time 2026-04-16T12:05:00Z \
            --overwrite

      - name: Malformed fixture must fail
        run: |
          if python3 mapper/map_to_assay.py \
            fixtures/malformed.harness.json \
            --output /tmp/malformed.assay.ndjson \
            --import-time 2026-04-16T12:10:00Z \
            --overwrite 2>&1; then
            echo "ERROR: malformed fixture should have been rejected"
            exit 1
          else
            echo "OK: malformed fixture correctly rejected"
          fi

      - name: Verify golden output matches
        run: |
          diff /tmp/valid.assay.ndjson fixtures/valid.assay.ndjson
          diff /tmp/failure.assay.ndjson fixtures/failure.assay.ndjson
          echo "OK: golden outputs match checked-in fixtures"

  golden-contracts:
    name: Golden Contract Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run golden contract tests
        run: python3 -m unittest tests.test_contracts -v

  hardening:
    name: Hardening Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: ./.github/actions/setup-node-harness

      - name: Run hardening tests
        run: python3 -m unittest tests.test_hardening -v

  policy-validation:
    name: Policy Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Validate policy - allowed tool
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool read_file
          echo "OK: read_file correctly allowed"

      - name: Validate policy - denied tool (exit 1)
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool network_egress && exit 1 || echo "OK: network_egress correctly denied (exit 1)"

      - name: Validate policy - approval-required tool
        working-directory: harness
        run: |
          output=$(npx tsx src/cli.ts policy --tool write_file)
          echo "$output"
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['decision'] == 'require_approval', f'Expected require_approval, got {d[\"decision\"]}'
          print('OK: write_file correctly requires approval')
          "

  verify-evidence:
    name: Verify Evidence
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: contract-validation
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Verify valid evidence (all categories)
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/valid.assay.ndjson --category all

      - name: Verify failure evidence
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/failure.assay.ndjson

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [contract-validation, verify-evidence]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Run compare
        id: compare
        working-directory: harness
        continue-on-error: true
        run: |
          mkdir -p ../results
          npx tsx src/cli.ts compare \
            --baseline ../fixtures/valid.assay.ndjson \
            --candidate ../fixtures/failure.assay.ndjson \
            --format json \
            | tee ../results/compare-report.json

      - name: Generate Trust Basis diff projections
        if: always() && hashFiles('results/trust-basis.diff.json') != ''
        working-directory: harness
        run: |
          npx tsx src/cli.ts trust-basis report \
            --diff ../results/trust-basis.diff.json \
            --summary-out ../results/trust-basis-summary.md \
            --junit-out ../results/junit-trust-basis.xml

      - name: Generate Trust Basis contract fixture projections
        if: always()
        working-directory: harness
        run: |
          mkdir -p ../results/trust-basis-contract
          cp fixtures/trust-basis/nonregression.trust-basis.diff.json \
            ../results/trust-basis-contract/nonregression.trust-basis.diff.json
          cp fixtures/trust-basis/regression.trust-basis.diff.json \
            ../results/trust-basis-contract/regression.trust-basis.diff.json
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/nonregression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/nonregression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-nonregression.xml
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/regression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/regression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-regression.xml

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Regression Gate"
            echo ""

            if [ -f "results/compare-report.json" ]; then
              HAS_REG=$(python3 -c "import json; d=json.load(open('results/compare-report.json')); print('yes' if d.get('has_regressions') else 'no')")
              if [ "$HAS_REG" = "yes" ]; then
                echo "**Status:** REGRESSION DETECTED"
              else
                echo "**Status:** OK"
              fi
              echo "**Baseline:** fixtures/valid.assay.ndjson"
              echo "**Candidate:** fixtures/failure.assay.ndjson"
              echo ""
              echo "### Findings"
              python3 -c "
          import json
          d = json.load(open('results/compare-report.json'))
          print(f\"- New denials: {len(d.get('new_denials', []))}\")
          print(f\"- Hash mismatches: {len(d.get('hash_mismatches', []))}\")
          print(f\"- Process counter changes: {len(d.get('process_summary_delta', []))}\")
          "
            else
              echo "**Status:** ERROR - compare report not found"
            fi

            if [ -f "results/trust-basis-summary.md" ]; then
              echo ""
              cat "results/trust-basis-summary.md"
            fi

            if [ -f "results/trust-basis-contract/nonregression-summary.md" ]; then
              echo ""
              echo "## Trust Basis Contract Fixture"
              echo ""
              cat "results/trust-basis-contract/nonregression-summary.md"
            fi

            if [ -f "results/trust-basis-contract/regression-summary.md" ]; then
              echo ""
              cat "results/trust-basis-contract/regression-summary.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate JUnit XML from compare
        if: always() && steps.compare.outcome != 'skipped'
        run: |
          python3 ci/emit_compare_junit.py \
            results/compare-report.json \
            --output results/junit-compare.xml

      - name: Upload compare results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compare-report
          path: |
            results/compare-report.json
            results/junit-compare.xml
            results/trust-basis.diff.json
            results/trust-basis-summary.md
            results/junit-trust-basis.xml
            results/trust-basis-contract/nonregression.trust-basis.diff.json
            results/trust-basis-contract/regression.trust-basis.diff.json
            results/trust-basis-contract/nonregression-summary.md
            results/trust-basis-contract/regression-summary.md
            results/trust-basis-contract/junit-nonregression.xml
            results/trust-basis-contract/junit-regression.xml

      - name: Fail on regressions
        if: steps.compare.outcome == 'failure'
        run: |
          echo "Regressions detected — failing the gate."
          exit 1

  evidence-export:
    name: Evidence Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    needs: [contract-validation, verify-evidence, regression-gate]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate JUnit XML (valid)
        run: |
          python3 ci/emit_junit.py \
            fixtures/valid.assay.ndjson \
            --output results/junit-valid.xml

      - name: Generate JUnit XML (failure)
        run: |
          python3 ci/emit_junit.py \
            fixtures/failure.assay.ndjson \
            --output results/junit-failure.xml

      - name: Generate SARIF (valid)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/valid.assay.ndjson \
            --output results/sarif-valid.json

      - name: Generate SARIF (failure)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/failure.assay.ndjson \
            --output results/sarif-failure.json

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harness-evidence
          path: |
            results/junit-*.xml
            results/sarif-*.json
            fixtures/valid.assay.ndjson
            fixtures/failure.assay.ndjson

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.36.2
        if: always()
        continue-on-error: true
        with:
          sarif_file: results/sarif-valid.json
          category: assay-harness

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Assay Harness Evidence Report"
            echo ""
            echo "| Fixture | JUnit | SARIF |"
            echo "|---------|-------|-------|"
            echo "| valid | \`results/junit-valid.xml\` | \`results/sarif-valid.json\` |"
            echo "| failure | \`results/junit-failure.xml\` | \`results/sarif-failure.json\` |"
            echo ""
            echo "### Event Counts"
            valid_events=$(wc -l < "fixtures/valid.assay.ndjson")
            failure_events=$(wc -l < "fixtures/failure.assay.ndjson")
            echo "- valid: ${valid_events} events"
            echo "- failure: ${failure_events} events"
          } >> "$GITHUB_STEP_SUMMARY"

  assay-release-compatibility:
    name: Assay Release Compatibility Recipes
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Resolve Assay release tag
        # The workflow_dispatch input is read via env to prevent shell
        # template injection (zizmor: template-injection).
        env:
          ASSAY_VERSION_INPUT: ${{ inputs.assay_version }}
        run: |
          assay_version="$ASSAY_VERSION_INPUT"
          if [ -z "$assay_version" ]; then
            assay_version="v3.27.0"
          fi
          case "$assay_version" in
            v*) ;;
            *) assay_version="v${assay_version}" ;;
          esac
          echo "ASSAY_VERSION=$assay_version" >> "$GITHUB_ENV"

      - name: Download Assay release binary
        run: |
          set -euo pipefail
          mkdir -p /tmp/assay-release
          cd /tmp/assay-release

          asset="assay-${ASSAY_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          base_url="https://github.com/Rul1an/assay/releases/download/${ASSAY_VERSION}"
          curl -fsSLO "${base_url}/${asset}"
          curl -fsSLO "${base_url}/${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          tar -xzf "$asset"

          assay_bin="/tmp/assay-release/assay-${ASSAY_VERSION}-x86_64-unknown-linux-gnu/assay"
          test -x "$assay_bin"
          echo "ASSAY_BIN=$assay_bin" >> "$GITHUB_ENV"
          "$assay_bin" --version

      - name: Run receipt recipes against Assay release
        run: |
          set -euo pipefail
          root="$PWD"
          results="$root/results/assay-release-compatibility"
          mkdir -p "$results"

          run_recipe() {
            family="$1"
            script="$2"
            case_name="$3"
            expected="$4"
            out_dir="$results/${family}-${case_name}"

            set +e
            ASSAY_BIN="$ASSAY_BIN" "$script" \
              --case "$case_name" \
              --out-dir "$out_dir" \
              --overwrite
            status="$?"
            set -e

            if [ "$status" -ne "$expected" ]; then
              echo "Expected ${script} ${case_name} to exit ${expected}, got ${status}" >&2
              exit 1
            fi

            test -f "$out_dir/trust-basis.diff.json"
            test -f "$out_dir/trust-basis-summary.md"
            test -f "$out_dir/junit-trust-basis.xml"
          }

          run_recipe promptfoo demo/run-promptfoo-receipt-pipeline.sh nonregression 0
          run_recipe promptfoo demo/run-promptfoo-receipt-pipeline.sh trust-basis-regression-fixture 1
          run_recipe openfeature demo/run-openfeature-decision-receipt-pipeline.sh nonregression 0
          run_recipe openfeature demo/run-openfeature-decision-receipt-pipeline.sh trust-basis-regression-fixture 1
          run_recipe cyclonedx demo/run-cyclonedx-mlbom-model-receipt-pipeline.sh nonregression 0
          run_recipe cyclonedx demo/run-cyclonedx-mlbom-model-receipt-pipeline.sh trust-basis-regression-fixture 1

      - name: Compatibility summary
        if: always()
        run: |
          {
            echo "## Assay Release Compatibility Recipes"
            echo ""
            echo "**Assay release:** \`${ASSAY_VERSION:-unknown}\`"
            echo ""
            echo "| Family | Non-regression | Regression fixture |"
            echo "|---|---:|---:|"
            echo "| Promptfoo eval receipts | exit 0 | exit 1 |"
            echo "| OpenFeature decision receipts | exit 0 | exit 1 |"
            echo "| CycloneDX ML-BOM inventory receipts | exit 0 | exit 1 |"
            echo ""
            echo "Each recipe must produce \`trust-basis.diff.json\`, \`trust-basis-summary.md\`, and \`junit-trust-basis.xml\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload recipe compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: assay-release-compatibility-recipes-${{ env.ASSAY_VERSION }}
          path: results/assay-release-compatibility/**

  assay-inventory-recipe:
    name: Assay Inventory Recipe (hermetic E2E)
    # Dispatch-only, like the receipt recipes: it produces the end-to-end proof
    # (hosted_run + digests) that a controlled update folds into the suite matrix
    # to flip the inventory row from declared -> proven. It is not run on every
    # unrelated PR (keeping the proof rail small and predictable).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Resolve + download released Assay binary
        env:
          ASSAY_VERSION_INPUT: ${{ inputs.assay_version }}
        run: |
          set -euo pipefail
          assay_version="${ASSAY_VERSION_INPUT:-}"
          [ -z "$assay_version" ] && assay_version="v3.27.0"
          case "$assay_version" in v*) ;; *) assay_version="v${assay_version}" ;; esac
          echo "ASSAY_VERSION=$assay_version" >> "$GITHUB_ENV"
          mkdir -p /tmp/assay-release && cd /tmp/assay-release
          asset="assay-${assay_version}-x86_64-unknown-linux-gnu.tar.gz"
          base="https://github.com/Rul1an/assay/releases/download/${assay_version}"
          # Retry/timeout so a transient GitHub/CDN hiccup does not fail the proof run.
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          # The verified release asset (tarball) is the honest bind point for the external GitHub
          # attestation (H-next-4): GitHub attests this asset, NOT the extracted binary below.
          echo "ASSAY_ASSET_NAME=$asset" >> "$GITHUB_ENV"
          echo "ASSAY_ASSET_PATH=/tmp/assay-release/$asset" >> "$GITHUB_ENV"
          tar -xzf "$asset"
          bin="/tmp/assay-release/assay-${assay_version}-x86_64-unknown-linux-gnu/assay"
          test -x "$bin"
          echo "ASSAY_BIN=$bin" >> "$GITHUB_ENV"
          "$bin" --version

      - name: Hermetic inventory emit + Harness consume
        working-directory: harness
        run: |
          set -x
          set -euo pipefail
          # Hermetic: scope discovery to a committed fixture, never ambient runner state.
          # On Linux v3.27.0 looks at $HOME/.config/claude/claude_desktop_config.json.
          export HOME="$RUNNER_TEMP/assay-mcp-home"
          export XDG_CONFIG_HOME="$HOME/.config"
          rm -rf "$HOME"
          mkdir -p "$HOME/.config/claude"
          fixture="fixtures/suite-compatibility/mcp-config/claude_desktop_config.json"
          test -f "$fixture" || { echo "FIXTURE MISSING: $fixture (cwd=$PWD)"; ls -la fixtures/suite-compatibility/ || true; exit 1; }
          cp "$fixture" "$HOME/.config/claude/claude_desktop_config.json"
          echo "=== placed fixture ==="; ls -la "$HOME/.config/claude/"; cat "$HOME/.config/claude/claude_desktop_config.json"

          fixture_digest="sha256:$(sha256sum "$fixture" | cut -d' ' -f1)"
          binary_digest="sha256:$(sha256sum "$ASSAY_BIN" | cut -d' ' -f1)"
          # The verified release asset's digest (== the GitHub-attested subject for this tarball).
          release_asset_digest="sha256:$(sha256sum "$ASSAY_ASSET_PATH" | cut -d' ' -f1)"

          # Emit the carrier from the RELEASED binary, scoped + deterministic
          # (--no-process-scan => process_scan is reported not_scanned, never partial).
          # Capture the exit code so a non-zero emit is reported, not swallowed by set -e.
          emit_rc=0
          "$ASSAY_BIN" mcp inventory --no-process-scan --out /tmp/inventory.json || emit_rc=$?
          echo "=== assay mcp inventory exit=$emit_rc ==="
          echo "=== inventory.json ==="; cat /tmp/inventory.json || { echo "(no inventory.json written)"; exit 1; }
          [ "$emit_rc" -eq 0 ] || { echo "emit failed (exit $emit_rc)"; exit 1; }
          artifact_digest="sha256:$(sha256sum /tmp/inventory.json | cut -d' ' -f1)"

          # Hermetic assertions with diagnostics: the released-binary output carries the
          # fixture server + the frozen schema, and nothing from the ambient host leaked in.
          grep -q 'assay.mcp_server_inventory.v0' /tmp/inventory.json || { echo "ASSERT FAIL: schema id missing from inventory.json"; exit 1; }
          # The fixture's "notes" server is emitted with its client prefix as
          # server_id "claude_desktop-notes" from source "claude_desktop_mcp_config".
          grep -q 'claude_desktop-notes' /tmp/inventory.json || { echo "ASSERT FAIL: fixture server (claude_desktop-notes) not discovered (config-path or parse mismatch)"; exit 1; }
          grep -q 'claude_desktop_mcp_config' /tmp/inventory.json || { echo "ASSERT FAIL: fixture source (claude_desktop) not attributed"; exit 1; }

          # Harness consumes it end-to-end (descriptive carrier => exit 0).
          npx tsx src/cli.ts carrier inventory --carrier /tmp/inventory.json

          # Emit the proof metadata for the controlled matrix flip (declared -> proven).
          {
            echo "## Inventory recipe — hermetic end-to-end proof"
            echo ""
            echo "Fold these into the inventory row of \`suite-compatibility.json\` via a controlled update:"
            echo ""
            echo "- \`hosted_run\`: \`${GITHUB_RUN_ID}\`"
            echo "- \`assay_version\`: \`${ASSAY_VERSION}\`"
            echo "- \`assay_binary_digest\`: \`${binary_digest}\`"
            echo "- \`fixture_digest\`: \`${fixture_digest}\`"
            echo "- \`artifact_digest\`: \`${artifact_digest}\`"
            echo "- \`command\`: \`assay mcp inventory --no-process-scan --out /tmp/inventory.json\`"
            echo "- \`runner_os\`: \`${RUNNER_OS}\` (ubuntu-latest)"
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit suite.recipe_provenance.v0 as a file so the Evidence Pack (H-next-3)
          # can bundle it — the same proof facts, machine-readable. Derive the harness
          # version from package.json so it cannot drift from the CLI's stamped value.
          harness_version="$(node -p "require('./package.json').version")"
          cat > /tmp/recipe.provenance.json <<PROV
          {
            "schema": "suite.recipe_provenance.v0",
            "recipe": "assay_mcp_inventory_e2e",
            "hosted_run": "${GITHUB_RUN_ID}",
            "runner_os": "ubuntu-latest",
            "hosted": true,
            "ambient_scan": false,
            "assay": { "version": "${ASSAY_VERSION}", "binary_digest": "${binary_digest}", "command": "assay mcp inventory --no-process-scan --out /tmp/inventory.json" },
            "release_asset": { "path": "${ASSAY_ASSET_NAME}", "digest": "${release_asset_digest}" },
            "fixture": { "path": "${fixture}", "digest": "${fixture_digest}" },
            "artifact": { "path": "carriers/assay.mcp_server_inventory.v0.json", "digest": "${artifact_digest}" },
            "harness": { "version": "${harness_version}", "command": "assay-harness carrier inventory --carrier carriers/assay.mcp_server_inventory.v0.json" },
            "result": { "exit_code": 0, "classification": "success" }
          }
          PROV
          # Validate provenance SHAPE (schema, required string fields, hermetic-success
          # invariants), not just JSON parseability, so contract drift fails at emit time.
          # verifyEvidencePack stays the authoritative validator (validateRecipeProvenance).
          node -e '
            const p = JSON.parse(require("fs").readFileSync("/tmp/recipe.provenance.json", "utf-8"));
            const fail = (m) => { console.error("provenance shape invalid: " + m); process.exit(1); };
            if (p.schema !== "suite.recipe_provenance.v0") fail("schema");
            for (const k of ["recipe", "hosted_run", "runner_os"]) if (typeof p[k] !== "string" || !p[k]) fail(k);
            if (p.hosted !== true) fail("hosted");
            if (p.ambient_scan !== false) fail("ambient_scan");
            const reqs = { assay: ["version", "binary_digest", "command"], release_asset: ["path", "digest"], fixture: ["path", "digest"], artifact: ["path", "digest"], harness: ["version", "command"] };
            for (const obj of Object.keys(reqs)) for (const k of reqs[obj]) if (typeof (p[obj] || {})[k] !== "string" || !p[obj][k]) fail(obj + "." + k);
            if (!/^sha256:[0-9a-f]{64}$/.test(p.release_asset.digest)) fail("release_asset.digest (must be sha256:<64-hex>)");
            if (!p.result || p.result.exit_code !== 0 || p.result.classification !== "success") fail("result");
            console.log("provenance shape OK");
          '

      - name: Upload inventory carrier + provenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: inventory-carrier
          path: |
            /tmp/inventory.json
            /tmp/recipe.provenance.json
          if-no-files-found: warn

  assay-supply-chain-recipe:
    name: Assay Supply-Chain Recipe (hermetic E2E)
    # Dispatch-only, like the inventory recipe: it produces the end-to-end proof
    # (hosted_run + digests) that a controlled update folds into the suite matrix
    # to flip the supply_chain row from declared -> proven. Not run on every PR.
    #
    # Assay v3.28.0's supply-chain emitter (v1) emits only none/unsupported provenance,
    # so the carrier is honestly policy_result=incomplete and `carrier supply-chain` exits 6.
    # That exit 6 is the EXPECTED, successful consumption for this proof: it shows
    # Harness recognizes the carrier and refuses to read incomplete as clean. The
    # proof establishes producer->consumer compatibility, NOT a clean carrier.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Resolve + download released Assay binary
        env:
          ASSAY_VERSION_INPUT: ${{ inputs.assay_version }}
        run: |
          set -euo pipefail
          # Default to v3.28.0 (the first release with the one-shot supply-chain emitter) and
          # FAIL CLOSED on any older version: the shared dispatch input defaults to v3.27.0,
          # which has no emitter, and the proof binds min_version v3.28.0 — so a run against an
          # emitter-less release must not silently produce a bogus proof.
          assay_version="${ASSAY_VERSION_INPUT:-v3.28.0}"
          case "$assay_version" in v*) ;; *) assay_version="v${assay_version}" ;; esac
          min_required="3.28.0"
          resolved="${assay_version#v}"
          if [ "$(printf '%s\n' "$min_required" "$resolved" | sort -V | head -n1)" != "$min_required" ]; then
            echo "supply-chain recipe requires Assay >= v${min_required}; got ${assay_version}" >&2
            exit 1
          fi
          echo "ASSAY_VERSION=$assay_version" >> "$GITHUB_ENV"
          mkdir -p /tmp/assay-release && cd /tmp/assay-release
          asset="assay-${assay_version}-x86_64-unknown-linux-gnu.tar.gz"
          base="https://github.com/Rul1an/assay/releases/download/${assay_version}"
          # Retry/timeout so a transient GitHub/CDN hiccup does not fail the proof run.
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          # The verified release asset (tarball) is the honest bind point for the external
          # GitHub attestation (H-next-4): GitHub attests this asset, NOT the extracted binary.
          echo "ASSAY_ASSET_NAME=$asset" >> "$GITHUB_ENV"
          echo "ASSAY_ASSET_PATH=/tmp/assay-release/$asset" >> "$GITHUB_ENV"
          tar -xzf "$asset"
          bin="/tmp/assay-release/assay-${assay_version}-x86_64-unknown-linux-gnu/assay"
          test -x "$bin"
          echo "ASSAY_BIN=$bin" >> "$GITHUB_ENV"
          "$bin" --version

      - name: Hermetic supply-chain emit + Harness consume
        working-directory: harness
        run: |
          set -x
          set -euo pipefail
          # Hermetic: the emitter reads ONLY the committed descriptor fixture and runs
          # --offline (no live registry/Sigstore/Rekor lookup, no ambient/process scan).
          fixture="fixtures/suite-compatibility/supply-chain/input.example.json"
          test -f "$fixture" || { echo "FIXTURE MISSING: $fixture (cwd=$PWD)"; exit 1; }

          fixture_digest="sha256:$(sha256sum "$fixture" | cut -d' ' -f1)"
          binary_digest="sha256:$(sha256sum "$ASSAY_BIN" | cut -d' ' -f1)"
          # The verified release asset's digest (== the GitHub-attested subject for this tarball).
          release_asset_digest="sha256:$(sha256sum "$ASSAY_ASSET_PATH" | cut -d' ' -f1)"

          # Emit the carrier from the RELEASED binary (offline, committed input). The emitter
          # exits 0 emitting a VALID carrier even when policy_result is incomplete (carrier
          # emitted != clean); capture rc so a non-zero emit is reported, not swallowed.
          emit_rc=0
          "$ASSAY_BIN" registry supply-chain-conformance \
            --input "$fixture" --out /tmp/supply-chain-conformance.json --offline || emit_rc=$?
          echo "=== assay registry supply-chain-conformance exit=$emit_rc ==="
          cat /tmp/supply-chain-conformance.json || { echo "(no carrier written)"; exit 1; }
          [ "$emit_rc" -eq 0 ] || { echo "emit failed (exit $emit_rc)"; exit 1; }
          artifact_digest="sha256:$(sha256sum /tmp/supply-chain-conformance.json | cut -d' ' -f1)"

          # Hermetic assertions: the released-binary output carries the frozen schema and the
          # honest, EXPECTED v1 verdict (unsupported provenance => policy_result incomplete).
          jq -e '.schema == "assay.supply_chain_conformance.v0"' /tmp/supply-chain-conformance.json >/dev/null \
            || { echo "ASSERT FAIL: carrier schema id missing"; exit 1; }
          policy_result="$(jq -r '.policy_result' /tmp/supply-chain-conformance.json)"
          echo "=== carrier policy_result=$policy_result ==="
          [ "$policy_result" = "incomplete" ] \
            || { echo "ASSERT FAIL: expected policy_result=incomplete for the v1 (unsupported-provenance) fixture, got $policy_result"; exit 1; }

          # Harness consumes/classifies it end-to-end. We asserted the carrier is
          # policy_result=incomplete above, so the gate MUST exit 6 (incomplete => not-clean).
          # Accepting exit 0 here would mask a regression that reads an incomplete carrier as
          # clean, so for THIS proof exit 6 is the only valid outcome ({2,3,7} are
          # config/contract/formatter failures; 0 would be incomplete-read-as-clean).
          consume_rc=0
          npx tsx src/cli.ts carrier supply-chain \
            --carrier /tmp/supply-chain-conformance.json --format json \
            > /tmp/sc.report.json 2> /tmp/sc.err || consume_rc=$?
          echo "=== carrier supply-chain exit=$consume_rc ==="
          cat /tmp/sc.report.json || true
          cat /tmp/sc.err || true
          case "$consume_rc" in
            6) : ;;
            *) echo "FAIL: an incomplete carrier must classify as not-clean (exit 6); got exit $consume_rc"; exit 1 ;;
          esac
          # exit 6 is only acceptable WITH a valid report whose policy_result matches the emitted incomplete.
          jq -e '.validation.valid == true and .policy_result == "incomplete"' /tmp/sc.report.json >/dev/null \
            || { echo "FAIL: consumer exit 6 without a valid incomplete report -> artifact_contract"; exit 1; }
          echo "=== consumption OK: exit=$consume_rc (valid, not-clean), policy_result=incomplete ==="

          # Proof metadata for the controlled matrix flip (declared -> proven).
          {
            echo "## Supply-chain recipe — hermetic end-to-end proof"
            echo ""
            echo "Producer->consumer path proven against released Assay ${ASSAY_VERSION}. The carrier is"
            echo "policy_result=\`${policy_result}\` and the gate exited \`${consume_rc}\` (valid, not-clean):"
            echo "this proves compatibility + incomplete-never-clean, NOT a clean supply-chain verdict."
            echo ""
            echo "Fold these into the supply_chain row of \`suite-compatibility.json\`:"
            echo "- \`hosted_run\`: \`${GITHUB_RUN_ID}\`"
            echo "- \`assay_version\`: \`${ASSAY_VERSION}\`"
            echo "- \`assay_binary_digest\`: \`${binary_digest}\`"
            echo "- \`fixture_digest\`: \`${fixture_digest}\`"
            echo "- \`artifact_digest\` (emitted carrier): \`${artifact_digest}\`"
            echo "- \`release_asset_digest\` (tarball): \`${release_asset_digest}\`"
            echo "- \`command\`: \`assay registry supply-chain-conformance --input ${fixture} --out /tmp/supply-chain-conformance.json --offline\`"
            echo "- \`runner_os\`: \`ubuntu-latest\`"
            echo "- consumer exit: \`${consume_rc}\` (valid, policy_result=${policy_result})"
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit suite.recipe_provenance.v0. result records RECIPE-EXECUTION success (the
          # pipeline emitted + validly consumed/classified the carrier), NOT carrier
          # cleanliness: the not-clean verdict lives in the carrier (policy_result) above and
          # in the projection. The Evidence Pack verifier requires result {0,"success"}.
          harness_version="$(node -p "require('./package.json').version")"
          cat > /tmp/recipe.provenance.json <<PROV
          {
            "schema": "suite.recipe_provenance.v0",
            "recipe": "assay_supply_chain_conformance_e2e",
            "hosted_run": "${GITHUB_RUN_ID}",
            "runner_os": "ubuntu-latest",
            "hosted": true,
            "ambient_scan": false,
            "assay": { "version": "${ASSAY_VERSION}", "binary_digest": "${binary_digest}", "command": "assay registry supply-chain-conformance --input ${fixture} --out /tmp/supply-chain-conformance.json --offline" },
            "release_asset": { "path": "${ASSAY_ASSET_NAME}", "digest": "${release_asset_digest}" },
            "fixture": { "path": "${fixture}", "digest": "${fixture_digest}" },
            "artifact": { "path": "carriers/assay.supply_chain_conformance.v0.json", "digest": "${artifact_digest}" },
            "harness": { "version": "${harness_version}", "command": "assay-harness carrier supply-chain --carrier carriers/assay.supply_chain_conformance.v0.json" },
            "result": { "exit_code": 0, "classification": "success" }
          }
          PROV
          # Validate provenance SHAPE (schema, required string fields, hermetic-success
          # invariants) at emit time. verifyEvidencePack stays the authoritative validator.
          node -e '
            const p = JSON.parse(require("fs").readFileSync("/tmp/recipe.provenance.json", "utf-8"));
            const fail = (m) => { console.error("provenance shape invalid: " + m); process.exit(1); };
            if (p.schema !== "suite.recipe_provenance.v0") fail("schema");
            for (const k of ["recipe", "hosted_run", "runner_os"]) if (typeof p[k] !== "string" || !p[k]) fail(k);
            if (p.hosted !== true) fail("hosted");
            if (p.ambient_scan !== false) fail("ambient_scan");
            const reqs = { assay: ["version", "binary_digest", "command"], release_asset: ["path", "digest"], fixture: ["path", "digest"], artifact: ["path", "digest"], harness: ["version", "command"] };
            for (const obj of Object.keys(reqs)) for (const k of reqs[obj]) if (typeof (p[obj] || {})[k] !== "string" || !p[obj][k]) fail(obj + "." + k);
            if (!/^sha256:[0-9a-f]{64}$/.test(p.release_asset.digest)) fail("release_asset.digest (must be sha256:<64-hex>)");
            if (!p.result || p.result.exit_code !== 0 || p.result.classification !== "success") fail("result");
            console.log("provenance shape OK");
          '

      - name: Upload supply-chain carrier + provenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-carrier
          path: |
            /tmp/supply-chain-conformance.json
            /tmp/sc.report.json
            /tmp/recipe.provenance.json
          if-no-files-found: warn

  assay-supply-chain-dsse-recipe:
    name: Assay Supply-Chain DSSE Clean/Pass Recipe (hermetic E2E)
    # Dispatch-only, additive sibling of assay-supply-chain-recipe. Produces the end-to-end
    # CLEAN/PASS proof: released Assay v3.29.0's DSSE provenance path emits a policy_result=pass
    # carrier from a committed pinned-key DSSE fixture, and Harness consumes it at exit 0
    # (passed=true). A controlled update folds this into a NEW recipe_row; it does NOT replace
    # the A5a-2 valid-not-clean carrier-row proof. INVERSE of A5a-2: a pass carrier MUST consume
    # at exit 0; exit 6 here is a contract failure.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-harness

      - name: Resolve + download released Assay binary
        env:
          ASSAY_VERSION_INPUT: ${{ inputs.assay_version }}
        run: |
          set -euo pipefail
          # The DSSE provenance path shipped in v3.29.0; default there and FAIL CLOSED on any
          # older version (the shared dispatch input defaults to v3.27.0, which has no DSSE path).
          assay_version="${ASSAY_VERSION_INPUT:-v3.29.0}"
          case "$assay_version" in v*) ;; *) assay_version="v${assay_version}" ;; esac
          min_required="3.29.0"
          resolved="${assay_version#v}"
          if [ "$(printf '%s\n' "$min_required" "$resolved" | sort -V | head -n1)" != "$min_required" ]; then
            echo "supply-chain DSSE recipe requires Assay >= v${min_required}; got ${assay_version}" >&2
            exit 1
          fi
          echo "ASSAY_VERSION=$assay_version" >> "$GITHUB_ENV"
          mkdir -p /tmp/assay-release && cd /tmp/assay-release
          asset="assay-${assay_version}-x86_64-unknown-linux-gnu.tar.gz"
          base="https://github.com/Rul1an/assay/releases/download/${assay_version}"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}"
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            --connect-timeout 15 --max-time 180 -O "${base}/${asset}.sha256"
          sha256sum -c "${asset}.sha256"
          echo "ASSAY_ASSET_NAME=$asset" >> "$GITHUB_ENV"
          echo "ASSAY_ASSET_PATH=/tmp/assay-release/$asset" >> "$GITHUB_ENV"
          tar -xzf "$asset"
          bin="/tmp/assay-release/assay-${assay_version}-x86_64-unknown-linux-gnu/assay"
          test -x "$bin"
          echo "ASSAY_BIN=$bin" >> "$GITHUB_ENV"
          "$bin" --version

      - name: Hermetic DSSE clean/pass emit + Harness consume
        working-directory: harness
        run: |
          set -x
          set -euo pipefail
          # Hermetic: the emitter reads ONLY the committed pinned-key DSSE fixture and runs
          # --offline (no live registry/Sigstore/Rekor lookup, no ambient/process scan).
          fixture="fixtures/suite-compatibility/supply-chain-dsse/input.dsse.example.json"
          test -f "$fixture" || { echo "FIXTURE MISSING: $fixture (cwd=$PWD)"; exit 1; }

          fixture_digest="sha256:$(sha256sum "$fixture" | cut -d' ' -f1)"
          binary_digest="sha256:$(sha256sum "$ASSAY_BIN" | cut -d' ' -f1)"
          release_asset_digest="sha256:$(sha256sum "$ASSAY_ASSET_PATH" | cut -d' ' -f1)"

          emit_rc=0
          "$ASSAY_BIN" registry supply-chain-conformance \
            --input "$fixture" --out /tmp/supply-chain-conformance.dsse.json --offline || emit_rc=$?
          echo "=== assay registry supply-chain-conformance exit=$emit_rc ==="
          cat /tmp/supply-chain-conformance.dsse.json || { echo "(no carrier written)"; exit 1; }
          [ "$emit_rc" -eq 0 ] || { echo "emit failed (exit $emit_rc)"; exit 1; }
          artifact_digest="sha256:$(sha256sum /tmp/supply-chain-conformance.dsse.json | cut -d' ' -f1)"

          # CLEAN/PASS assertions: the released DSSE path verifies the pinned-key envelope and the
          # policy is satisfied, so the carrier is policy_result=pass (the inverse of A5a-2).
          jq -e '.schema == "assay.supply_chain_conformance.v0"' /tmp/supply-chain-conformance.dsse.json >/dev/null \
            || { echo "ASSERT FAIL: carrier schema id missing"; exit 1; }
          policy_result="$(jq -r '.policy_result' /tmp/supply-chain-conformance.dsse.json)"
          dsse_sig="$(jq -r '.checks.provenance.dsse_signature' /tmp/supply-chain-conformance.dsse.json)"
          echo "=== carrier policy_result=$policy_result dsse_signature=$dsse_sig ==="
          [ "$policy_result" = "pass" ] \
            || { echo "ASSERT FAIL: expected policy_result=pass for the DSSE clean/pass fixture, got $policy_result"; exit 1; }
          [ "$dsse_sig" = "verified" ] \
            || { echo "ASSERT FAIL: expected dsse_signature=verified, got $dsse_sig"; exit 1; }

          # Harness consumes/classifies it. We asserted policy_result=pass, so the gate MUST exit 0
          # (clean). exit 6 here would mean a pass carrier read as not-clean (a regression) — the
          # INVERSE of the A5a-2 incomplete recipe; {2,3,7} are config/contract/formatter failures.
          consume_rc=0
          npx tsx src/cli.ts carrier supply-chain \
            --carrier /tmp/supply-chain-conformance.dsse.json --format json \
            > /tmp/sc.dsse.report.json 2> /tmp/sc.dsse.err || consume_rc=$?
          echo "=== carrier supply-chain exit=$consume_rc ==="
          cat /tmp/sc.dsse.report.json || true
          cat /tmp/sc.dsse.err || true
          case "$consume_rc" in
            0) : ;;
            *) echo "FAIL: a policy_result=pass carrier must consume clean (exit 0); got exit $consume_rc"; exit 1 ;;
          esac
          jq -e '.validation.valid == true and .passed == true and .policy_result == "pass"' /tmp/sc.dsse.report.json >/dev/null \
            || { echo "FAIL: consumer exit 0 without a valid passed=true/pass report -> artifact_contract"; exit 1; }
          echo "=== consumption OK: exit=0 (clean), passed=true, policy_result=pass ==="

          {
            echo "## Supply-chain DSSE clean/pass recipe — hermetic end-to-end proof"
            echo ""
            echo "Released Assay ${ASSAY_VERSION} DSSE path emitted a policy_result=\`${policy_result}\` carrier;"
            echo "Harness consumed it at exit \`${consume_rc}\` with passed=true. Additional clean/pass recipe"
            echo "for the already-proven supply_chain row (does not replace the A5a-2 valid-not-clean proof)."
            echo ""
            echo "Fold these into a NEW recipe_row of \`suite-compatibility.json\`:"
            echo "- \`recipe\`: \`supply-chain DSSE clean/pass recipe\`"
            echo "- \`hosted_run\`: \`${GITHUB_RUN_ID}\`"
            echo "- \`assay_version\`: \`${ASSAY_VERSION}\`"
            echo "- \`artifact_digest\` (emitted carrier): \`${artifact_digest}\`"
            echo "- \`assay_binary_digest\`: \`${binary_digest}\`"
            echo "- \`fixture_digest\`: \`${fixture_digest}\`"
            echo "- \`release_asset_digest\` (tarball): \`${release_asset_digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit suite.recipe_provenance.v0 for the clean/pass run. result records RECIPE-EXECUTION
          # success; the pass verdict lives in the carrier (policy_result) and the report (passed).
          harness_version="$(node -p "require('./package.json').version")"
          cat > /tmp/recipe.provenance.dsse.json <<PROV
          {
            "schema": "suite.recipe_provenance.v0",
            "recipe": "assay_supply_chain_conformance_dsse_clean_pass",
            "hosted_run": "${GITHUB_RUN_ID}",
            "runner_os": "ubuntu-latest",
            "hosted": true,
            "ambient_scan": false,
            "assay": { "version": "${ASSAY_VERSION}", "binary_digest": "${binary_digest}", "command": "assay registry supply-chain-conformance --input ${fixture} --out /tmp/supply-chain-conformance.dsse.json --offline" },
            "release_asset": { "path": "${ASSAY_ASSET_NAME}", "digest": "${release_asset_digest}" },
            "fixture": { "path": "${fixture}", "digest": "${fixture_digest}" },
            "artifact": { "path": "carriers/assay.supply_chain_conformance.v0.json", "digest": "${artifact_digest}" },
            "harness": { "version": "${harness_version}", "command": "assay-harness carrier supply-chain --carrier carriers/assay.supply_chain_conformance.v0.json" },
            "result": { "exit_code": 0, "classification": "success" }
          }
          PROV
          node -e '
            const p = JSON.parse(require("fs").readFileSync("/tmp/recipe.provenance.dsse.json", "utf-8"));
            const fail = (m) => { console.error("provenance shape invalid: " + m); process.exit(1); };
            if (p.schema !== "suite.recipe_provenance.v0") fail("schema");
            for (const k of ["recipe", "hosted_run", "runner_os"]) if (typeof p[k] !== "string" || !p[k]) fail(k);
            if (p.hosted !== true) fail("hosted");
            if (p.ambient_scan !== false) fail("ambient_scan");
            const reqs = { assay: ["version", "binary_digest", "command"], release_asset: ["path", "digest"], fixture: ["path", "digest"], artifact: ["path", "digest"], harness: ["version", "command"] };
            for (const obj of Object.keys(reqs)) for (const k of reqs[obj]) if (typeof (p[obj] || {})[k] !== "string" || !p[obj][k]) fail(obj + "." + k);
            if (!/^sha256:[0-9a-f]{64}$/.test(p.release_asset.digest)) fail("release_asset.digest (must be sha256:<64-hex>)");
            if (!p.result || p.result.exit_code !== 0 || p.result.classification !== "success") fail("result");
            console.log("provenance shape OK");
          '

      - name: Upload supply-chain DSSE carrier + provenance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-dsse-carrier
          path: |
            /tmp/supply-chain-conformance.dsse.json
            /tmp/sc.dsse.report.json
            /tmp/recipe.provenance.dsse.json
          if-no-files-found: warn
