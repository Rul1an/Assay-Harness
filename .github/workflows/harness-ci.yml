name: Harness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - name: Type check
        working-directory: harness
        run: npx tsc --noEmit

      - name: Run Node tests
        working-directory: harness
        run: npm test

  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Map valid fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/valid.harness.json \
            --output /tmp/valid.assay.ndjson \
            --import-time 2026-04-16T12:00:00Z \
            --overwrite

      - name: Map failure fixture
        run: |
          python3 mapper/map_to_assay.py \
            fixtures/failure.harness.json \
            --output /tmp/failure.assay.ndjson \
            --import-time 2026-04-16T12:05:00Z \
            --overwrite

      - name: Malformed fixture must fail
        run: |
          if python3 mapper/map_to_assay.py \
            fixtures/malformed.harness.json \
            --output /tmp/malformed.assay.ndjson \
            --import-time 2026-04-16T12:10:00Z \
            --overwrite 2>&1; then
            echo "ERROR: malformed fixture should have been rejected"
            exit 1
          else
            echo "OK: malformed fixture correctly rejected"
          fi

      - name: Verify golden output matches
        run: |
          diff /tmp/valid.assay.ndjson fixtures/valid.assay.ndjson
          diff /tmp/failure.assay.ndjson fixtures/failure.assay.ndjson
          echo "OK: golden outputs match checked-in fixtures"

  golden-contracts:
    name: Golden Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run golden contract tests
        run: python3 -m unittest tests.test_contracts -v

  hardening:
    name: Hardening Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json

      - name: Install Node dependencies
        working-directory: harness
        run: npm ci

      - name: Run hardening tests
        run: python3 -m unittest tests.test_hardening -v

  policy-validation:
    name: Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - name: Validate policy - allowed tool
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool read_file
          echo "OK: read_file correctly allowed"

      - name: Validate policy - denied tool (exit 1)
        working-directory: harness
        run: |
          npx tsx src/cli.ts policy --tool network_egress && exit 1 || echo "OK: network_egress correctly denied (exit 1)"

      - name: Validate policy - approval-required tool
        working-directory: harness
        run: |
          output=$(npx tsx src/cli.ts policy --tool write_file)
          echo "$output"
          echo "$output" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['decision'] == 'require_approval', f'Expected require_approval, got {d[\"decision\"]}'
          print('OK: write_file correctly requires approval')
          "

  verify-evidence:
    name: Verify Evidence
    runs-on: ubuntu-latest
    needs: contract-validation
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - name: Verify valid evidence (all categories)
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/valid.assay.ndjson --category all

      - name: Verify failure evidence
        working-directory: harness
        run: npx tsx src/cli.ts verify ../fixtures/failure.assay.ndjson

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    needs: [contract-validation, verify-evidence]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - name: Run compare
        id: compare
        working-directory: harness
        continue-on-error: true
        run: |
          mkdir -p ../results
          npx tsx src/cli.ts compare \
            --baseline ../fixtures/valid.assay.ndjson \
            --candidate ../fixtures/failure.assay.ndjson \
            --format json \
            | tee ../results/compare-report.json

      - name: Generate Trust Basis diff projections
        if: always() && hashFiles('results/trust-basis.diff.json') != ''
        working-directory: harness
        run: |
          npx tsx src/cli.ts trust-basis report \
            --diff ../results/trust-basis.diff.json \
            --summary-out ../results/trust-basis-summary.md \
            --junit-out ../results/junit-trust-basis.xml

      - name: Generate Trust Basis contract fixture projections
        if: always()
        working-directory: harness
        run: |
          mkdir -p ../results/trust-basis-contract
          cp fixtures/trust-basis/nonregression.trust-basis.diff.json \
            ../results/trust-basis-contract/nonregression.trust-basis.diff.json
          cp fixtures/trust-basis/regression.trust-basis.diff.json \
            ../results/trust-basis-contract/regression.trust-basis.diff.json
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/nonregression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/nonregression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-nonregression.xml
          npx tsx src/cli.ts trust-basis report \
            --diff fixtures/trust-basis/regression.trust-basis.diff.json \
            --summary-out ../results/trust-basis-contract/regression-summary.md \
            --junit-out ../results/trust-basis-contract/junit-regression.xml

      - name: Job Summary
        if: always()
        run: |
          echo "## Regression Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f results/compare-report.json ]; then
            HAS_REG=$(python3 -c "import json; d=json.load(open('results/compare-report.json')); print('yes' if d.get('has_regressions') else 'no')")
            if [ "$HAS_REG" = "yes" ]; then
              echo "**Status:** REGRESSION DETECTED" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** OK" >> $GITHUB_STEP_SUMMARY
            fi
            echo "**Baseline:** fixtures/valid.assay.ndjson" >> $GITHUB_STEP_SUMMARY
            echo "**Candidate:** fixtures/failure.assay.ndjson" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Findings" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d = json.load(open('results/compare-report.json'))
          print(f\"- New denials: {len(d.get('new_denials', []))}\")
          print(f\"- Hash mismatches: {len(d.get('hash_mismatches', []))}\")
          print(f\"- Process counter changes: {len(d.get('process_summary_delta', []))}\")
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ERROR - compare report not found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/trust-basis-summary.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat results/trust-basis-summary.md >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/trust-basis-contract/nonregression-summary.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Trust Basis Contract Fixture" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat results/trust-basis-contract/nonregression-summary.md >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/trust-basis-contract/regression-summary.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat results/trust-basis-contract/regression-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate JUnit XML from compare
        if: always() && steps.compare.outcome != 'skipped'
        run: |
          python3 ci/emit_compare_junit.py \
            results/compare-report.json \
            --output results/junit-compare.xml

      - name: Upload compare results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compare-report
          path: |
            results/compare-report.json
            results/junit-compare.xml
            results/trust-basis.diff.json
            results/trust-basis-summary.md
            results/junit-trust-basis.xml
            results/trust-basis-contract/nonregression.trust-basis.diff.json
            results/trust-basis-contract/regression.trust-basis.diff.json
            results/trust-basis-contract/nonregression-summary.md
            results/trust-basis-contract/regression-summary.md
            results/trust-basis-contract/junit-nonregression.xml
            results/trust-basis-contract/junit-regression.xml

      - name: Fail on regressions
        if: steps.compare.outcome == 'failure'
        run: |
          echo "Regressions detected — failing the gate."
          exit 1

  evidence-export:
    name: Evidence Export
    runs-on: ubuntu-latest
    needs: [contract-validation, verify-evidence, regression-gate]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate JUnit XML (valid)
        run: |
          python3 ci/emit_junit.py \
            fixtures/valid.assay.ndjson \
            --output results/junit-valid.xml

      - name: Generate JUnit XML (failure)
        run: |
          python3 ci/emit_junit.py \
            fixtures/failure.assay.ndjson \
            --output results/junit-failure.xml

      - name: Generate SARIF (valid)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/valid.assay.ndjson \
            --output results/sarif-valid.json

      - name: Generate SARIF (failure)
        run: |
          python3 ci/emit_sarif.py \
            fixtures/failure.assay.ndjson \
            --output results/sarif-failure.json

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harness-evidence
          path: |
            results/junit-*.xml
            results/sarif-*.json
            fixtures/valid.assay.ndjson
            fixtures/failure.assay.ndjson

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results/sarif-valid.json
          category: assay-harness

      - name: Job Summary
        if: always()
        run: |
          echo "## Assay Harness Evidence Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Fixture | JUnit | SARIF |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| valid | \`results/junit-valid.xml\` | \`results/sarif-valid.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "| failure | \`results/junit-failure.xml\` | \`results/sarif-failure.json\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Event Counts" >> $GITHUB_STEP_SUMMARY
          echo "- valid: $(wc -l < fixtures/valid.assay.ndjson) events" >> $GITHUB_STEP_SUMMARY
          echo "- failure: $(wc -l < fixtures/failure.assay.ndjson) events" >> $GITHUB_STEP_SUMMARY
