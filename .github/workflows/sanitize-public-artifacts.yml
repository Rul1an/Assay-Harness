name: Public Artifact Sanitization

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  public-artifact-sanitization:
    name: Public Artifact Sanitization
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Self-test sanitizer
        run: python3 ci/check_public_artifact_sanitization.py --self-test

      - name: Scan tracked public artifacts
        run: python3 ci/check_public_artifact_sanitization.py
