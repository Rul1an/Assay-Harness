name: Release

on:
  push:
    tags: ['v*']

# Workflow default: no privileges. Each job grants the minimum it needs.
# Release-write/attest scopes are job-level only.
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # No `cache: npm` here. Release workflows run once per tag, so the
      # cache hit-rate is negligible and the extra cache-storage round-trip
      # adds a small supply-chain surface (cache poisoning, replay across
      # tags). Cheaper to re-resolve `npm ci` from the registry on each
      # release. See .github/docs/CI-NOTES.md for the broader rationale.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - name: Typecheck
        working-directory: harness
        run: npx tsc --noEmit

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run contract tests
        run: python3 -m unittest tests.test_contracts -v

      - name: Run hardening tests
        run: python3 -m unittest tests.test_hardening -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release
      id-token: write       # mint OIDC token for attestations
      attestations: write   # upload build provenance attestation
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # No `cache: npm` here either — see comment in the test job.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: harness
        run: npm ci

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate evidence artifacts
        run: |
          mkdir -p artifacts

          python3 ci/emit_junit.py \
            fixtures/valid.assay.ndjson \
            --output artifacts/junit-valid.xml

          python3 ci/emit_junit.py \
            fixtures/failure.assay.ndjson \
            --output artifacts/junit-failure.xml

          python3 ci/emit_sarif.py \
            fixtures/valid.assay.ndjson \
            --output artifacts/sarif-valid.json

          python3 ci/emit_sarif.py \
            fixtures/failure.assay.ndjson \
            --output artifacts/sarif-failure.json

          cp fixtures/valid.assay.ndjson artifacts/
          cp fixtures/failure.assay.ndjson artifacts/

      - name: Create or update GitHub Release
        # Use the GitHub CLI directly instead of a third-party action so the
        # release-create surface uses only the workflow's existing
        # GITHUB_TOKEN scope. Equivalent functionality to the prior
        # softprops/action-gh-release call with generate_release_notes + files.
        #
        # Idempotent: if the release already exists (workflow re-run, manual
        # tag re-push, or a previously created draft), upload the assets to
        # the existing release with --clobber instead of failing.
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; uploading assets to it."
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              artifacts/*
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*
