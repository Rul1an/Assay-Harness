name: SBOM

on:
  push:
    branches: [main]

permissions:
  contents: read
  dependency-submission: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Submit npm dependencies
        uses: advanced-security/npm-dependency-submission@v1
        with:
          directory: harness
