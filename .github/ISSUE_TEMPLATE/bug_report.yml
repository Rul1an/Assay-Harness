name: Bug Report
description: Report a bug in Assay-Harness
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Provide input '...'
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages and exit codes if applicable.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - harness-runtime
        - policy-engine
        - evidence-compiler
        - mapper
        - ci-outputs
        - mcp-lane
    validations:
      required: true

  - type: dropdown
    id: failure-class
    attributes:
      label: Failure class
      description: What kind of failure is this?
      options:
        - policy-violation
        - artifact-contract
        - mapper-failure
        - ci-formatter
        - resume-error
        - other
    validations:
      required: true
